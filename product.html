<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product — House of Whiskers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="site-top"></div>

<div class="section-pad" id="pdRoot">
  <div class="crumbs" id="crumbs" style="margin-bottom:24px"></div>
  <div id="pdContent"></div>

  <div class="pd-tabs" id="pdTabs" style="display:none">
    <div class="pd-tabs-nav">
      <button class="on" onclick="showPanel(this,'desc')">Description</button>
      <button onclick="showPanel(this,'spec')">Details &amp; Delivery</button>
      <button onclick="showPanel(this,'rev')">Reviews</button>
    </div>
    <div class="pd-panel on" id="panel-desc"></div>
    <div class="pd-panel" id="panel-spec"></div>
    <div class="pd-panel" id="panel-rev"></div>
  </div>

  <div style="margin-top:64px">
    <div class="sec-head"><div><div class="sec-title" style="font-size:30px">You might also like</div></div><a href="shop.html" class="link-more">Shop all →</a></div>
    <div class="pgrid" id="related"></div>
  </div>
</div>

<div id="site-bottom"></div>
<script src="app.js"></script>
<script>
HOW.mountChrome();
const p = HOW.findProduct(HOW.qp('id'));
let qty = 1;

if(!p){
  document.getElementById('pdContent').innerHTML = '<div class="empty-state"><div class="es-icon">🐾</div><p>We couldn\'t find that product. <a href="shop.html" style="color:var(--sand-dk);text-decoration:underline">Back to the store</a>.</p></div>';
} else {
  document.title = p.brand + ' ' + p.name + ' — House of Whiskers';
  const petLabel = p.pet==='cats'?'Cats':'Dogs';
  document.getElementById('crumbs').innerHTML =
    `<a href="index.html">Home</a> / <a href="shop.html?pet=${p.pet}">${petLabel}</a> / <a href="shop.html?pet=${p.pet}&cat=${p.cat}">${HOW.catLabel(p.pet,p.cat)}</a> / <span>${p.brand}</span>`;

  const stars = '★'.repeat(Math.round(p.r))+'☆'.repeat(5-Math.round(p.r));
  document.getElementById('pdContent').innerHTML = `
    <div class="pd-wrap">
      <div class="pd-gallery">
        <div class="pd-main-img" id="pdMain">${p.emoji}</div>
        <div class="pd-thumbs">
          <div class="pd-thumb on">${p.emoji}</div>
          <div class="pd-thumb">📦</div>
          <div class="pd-thumb">🐾</div>
          <div class="pd-thumb">⭐</div>
        </div>
      </div>
      <div class="pd-info">
        <div class="pd-brand">${p.brand}</div>
        <h1 class="pd-name">${p.name}</h1>
        <div class="pd-rate"><span class="stars-row" style="font-size:14px">${stars}</span><span class="rcount">${p.r} · ${p.rv.toLocaleString()} reviews</span></div>
        <div class="pd-price-row">
          <span class="pd-price">${HOW.money(p.price)}</span>
          ${p.was?`<span class="pd-was">${HOW.money(p.was)}</span>`:''}
          ${p.was?`<span class="pd-save-pill">Save ${HOW.money(p.was-p.price)}</span>`:''}
        </div>
        <div class="pd-member">🐾 ${HOW.memberSaveStr(p)} with the Whisker Club</div>
        <p class="pd-desc">${p.desc}</p>
        <div class="pd-qty-row">
          <div class="pd-qty"><button onclick="bump(-1)">−</button><span id="qtyN">1</span><button onclick="bump(1)">+</button></div>
          <div style="font-size:13px;color:var(--mist)">In stock · ships today</div>
        </div>
        <div class="pd-actions">
          <button class="btn-primary" onclick="HOW.add('${p.id}',qty)">Add to Cart →</button>
          <button class="btn-ghost" style="color:var(--ink);border-color:var(--blush-mid)" onclick="HOW.toast('Saved to Wishlist')">♡ Save</button>
        </div>
        <ul class="pd-meta-list">
          <li>📦 <span><b>Free delivery</b> on orders over $149</span></li>
          <li>🔄 <span>Subscribe &amp; save an extra 5% with Repeat Delivery</span></li>
          <li>↩️ <span>Easy 30-day returns — replace or refund, no fuss</span></li>
          <li>🇦🇺 <span>Dispatched from our Australian warehouse</span></li>
        </ul>
      </div>
    </div>`;

  // tabs
  document.getElementById('pdTabs').style.display='block';
  document.getElementById('panel-desc').innerHTML = `<p>${p.desc}</p><p>Like everything in the House of Whiskers store, the ${p.brand} ${p.name.split('—')[0].trim()} earned its place by being something we'd happily give our own ${p.pet==='cats'?'cats':'dogs'}. No filler, no gimmicks — just a genuinely good product at a fair price, with up to 10% off every day for Whisker Club members.</p>`;
  document.getElementById('panel-spec').innerHTML = `
    <ul class="pd-meta-list" style="border:none;padding:0">
      <li><b>Brand</b><span>${p.brand}</span></li>
      <li><b>Best for</b><span>${p.pet==='cats'?'Cats':'Dogs'} · ${HOW.catLabel(p.pet,p.cat)}</span></li>
      <li><b>Delivery</b><span>1–4 business days · Free over $149</span></li>
      <li><b>Returns</b><span>30 days, change of mind welcome</span></li>
      <li><b>SKU</b><span>HOW-${p.id.toUpperCase()}-${p.rv}</span></li>
    </ul>`;
  document.getElementById('panel-rev').innerHTML = `
    <div style="margin-bottom:18px"><span class="stars-row" style="font-size:18px">${stars}</span> <b>${p.r} out of 5</b> · ${p.rv.toLocaleString()} verified reviews</div>
    <div class="review"><div class="review-top"><span class="review-name">Marnie T.</span><span class="stars-row">★★★★★</span></div><p>Exactly as described and arrived next day. ${p.pet==='cats'?'The cat':'My dog'} approves, which is the only review that counts in this house.</p></div>
    <div class="review"><div class="review-top"><span class="review-name">Dev P.</span><span class="stars-row">★★★★★</span></div><p>Great quality for the price, and the member discount made it a no-brainer. Will reorder.</p></div>
    <div class="review"><div class="review-top"><span class="review-name">Joss & Friends</span><span class="stars-row">★★★★☆</span></div><p>Does the job nicely. Packaging was tidy and the delivery tracking actually worked.</p></div>`;

  // related
  const related = HOW.CATALOG.filter(x=>x.id!==p.id && (x.cat===p.cat || x.pet===p.pet)).slice(0,4);
  HOW.renderGrid(document.getElementById('related'), related);
}

function bump(d){ qty=Math.max(1,qty+d); document.getElementById('qtyN').textContent=qty; }
function showPanel(btn,key){
  document.querySelectorAll('.pd-tabs-nav button').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  document.querySelectorAll('.pd-panel').forEach(pp=>pp.classList.remove('on'));
  document.getElementById('panel-'+key).classList.add('on');
}
</script>
</body>
</html>
