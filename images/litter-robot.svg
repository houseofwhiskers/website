<svg viewBox="0 0 1000 640" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Illustration of an automatic self-cleaning litter box with a skeptical cat">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F2E8E1"/>
      <stop offset="1" stop-color="#E8D5C8"/>
    </linearGradient>
    <linearGradient id="globe" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#D8BC97"/>
      <stop offset="1" stop-color="#C9A882"/>
    </linearGradient>
    <linearGradient id="base" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#A07850"/>
      <stop offset="1" stop-color="#8B5E3C"/>
    </linearGradient>
    <radialGradient id="hole" cx="0.5" cy="0.42" r="0.7">
      <stop offset="0" stop-color="#3D3530"/>
      <stop offset="1" stop-color="#1E1A17"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="1000" height="640" fill="url(#bg)"/>
  <circle cx="845" cy="135" r="190" fill="#C9A882" opacity="0.18"/>
  <circle cx="120" cy="500" r="120" fill="#C9A882" opacity="0.12"/>

  <!-- floor shadow -->
  <ellipse cx="640" cy="560" rx="230" ry="34" fill="#8B5E3C" opacity="0.18"/>
  <ellipse cx="250" cy="560" rx="110" ry="22" fill="#8B5E3C" opacity="0.14"/>

  <!-- ===== LITTER ROBOT ===== -->
  <!-- base / waste drawer -->
  <path d="M512 560 L520 430 a130 26 0 0 0 240 0 L768 560 a134 30 0 0 1 -256 0 Z" fill="url(#base)"/>
  <rect x="556" y="470" width="168" height="58" rx="12" fill="#7A4F32"/>
  <rect x="556" y="470" width="168" height="20" rx="10" fill="#6A4429" opacity="0.7"/>
  <rect x="618" y="512" width="44" height="7" rx="3.5" fill="#C9A882" opacity="0.85"/>

  <!-- globe -->
  <circle cx="640" cy="320" r="172" fill="url(#globe)"/>
  <circle cx="640" cy="320" r="172" fill="none" stroke="#A07850" stroke-width="3" opacity="0.5"/>
  <!-- seam line of rotating drum -->
  <path d="M474 286 a172 172 0 0 0 332 0" fill="none" stroke="#A07850" stroke-width="3" opacity="0.45"/>
  <!-- soft highlight -->
  <ellipse cx="585" cy="250" rx="58" ry="40" fill="#FFFFFF" opacity="0.22"/>

  <!-- entry opening -->
  <ellipse cx="640" cy="338" rx="104" ry="120" fill="#C9A882"/>
  <ellipse cx="640" cy="344" rx="90" ry="104" fill="url(#hole)"/>
  <ellipse cx="640" cy="344" rx="90" ry="104" fill="none" stroke="#A07850" stroke-width="5" opacity="0.6"/>

  <!-- status light -->
  <circle cx="744" cy="232" r="9" fill="#3D6E52"/>
  <circle cx="744" cy="232" r="16" fill="#3D6E52" opacity="0.25"/>

  <!-- scattered litter pellets -->
  <g fill="#A07850" opacity="0.55">
    <circle cx="500" cy="556" r="5"/>
    <circle cx="486" cy="566" r="4"/>
    <circle cx="520" cy="568" r="4"/>
    <circle cx="788" cy="560" r="5"/>
    <circle cx="804" cy="568" r="4"/>
  </g>

  <!-- ===== SKEPTICAL CAT ===== -->
  <g fill="#1E1A17">
    <!-- tail -->
    <path d="M315 540 q70 6 78 -54 q4 -34 -26 -40 q-20 -4 -18 18 q2 20 18 16 q-2 30 -54 30 Z"/>
    <!-- body -->
    <path d="M214 552 q-14 -150 78 -158 q92 8 78 158 Z"/>
    <!-- head -->
    <circle cx="292" cy="372" r="60"/>
    <!-- ears -->
    <path d="M250 338 l-12 -52 l44 26 Z"/>
    <path d="M334 338 l12 -52 l-44 26 Z"/>
  </g>
  <!-- inner ears -->
  <path d="M252 332 l-6 -28 l24 14 Z" fill="#D4796A" opacity="0.8"/>
  <path d="M332 332 l6 -28 l-24 14 Z" fill="#D4796A" opacity="0.8"/>
  <!-- eyes (narrowed / skeptical) -->
  <path d="M268 366 q12 -8 24 0" fill="none" stroke="#F2E8E1" stroke-width="6" stroke-linecap="round"/>
  <path d="M300 366 q12 -8 24 0" fill="none" stroke="#F2E8E1" stroke-width="6" stroke-linecap="round"/>
  <!-- nose -->
  <path d="M292 384 l-7 9 h14 Z" fill="#D4796A"/>
  <!-- whiskers -->
  <g stroke="#F2E8E1" stroke-width="3" stroke-linecap="round" opacity="0.85">
    <path d="M300 392 q34 -2 56 -12"/>
    <path d="M300 398 q34 6 56 6"/>
    <path d="M284 392 q-34 -2 -56 -12"/>
    <path d="M284 398 q-34 6 -56 6"/>
  </g>

  <!-- thought bubble: skepticism -->
  <g fill="#FFFFFF" stroke="#C9A882" stroke-width="2">
    <circle cx="372" cy="250" r="9"/>
    <circle cx="392" cy="226" r="13"/>
    <ellipse cx="438" cy="190" rx="58" ry="38"/>
  </g>
  <text x="438" y="200" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="34" fill="#3D3530" text-anchor="middle">. . .</text>
</svg>
